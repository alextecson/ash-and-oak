/* ------- Photo store (IndexedDB) ------- */
const Photos = (() => {
  let dbp;
  function open(){
    if (dbp) return dbp;
    dbp = new Promise((res, rej) => {
      const r = indexedDB.open('ashoak', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('photos');
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    return dbp;
  }
  async function get(k){
    const db = await open();
    return new Promise((res) => {
      const t = db.transaction('photos').objectStore('photos').get(k);
      t.onsuccess = () => res(t.result || null);
      t.onerror = () => res(null);
    });
  }
  async function set(k, v){
    const db = await open();
    return new Promise((res) => {
      const t = db.transaction('photos', 'readwrite').objectStore('photos').put(v, k);
      t.onsuccess = () => res(true);
      t.onerror = () => res(false);
    });
  }
  async function del(k){
    const db = await open();
    return new Promise((res) => {
      const t = db.transaction('photos', 'readwrite').objectStore('photos').delete(k);
      t.onsuccess = () => res(true);
      t.onerror = () => res(false);
    });
  }
  return { get, set, del };
})();

}
function seedSpirits(){

}

  }catch(e){}

  localStorage.setItem(LS_KEY, JSON.stringify(fresh));
  return fresh;
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function setThumb(el, id){
  const data = await Photos.get(id);
  if (data){ el.style.backgroundImage = `url(${data})`; el.textContent = ''; }
}
function pickAndStorePhoto(id, cb){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => {
    const file = inp.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = async () => {
        const max = 1000;
        let { width:w, height:h } = img;
        if (w > max || h > max){ const r = Math.min(max/w, max/h); w = Math.round(w*r); h = Math.round(h*r); }
        const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        const out = cv.toDataURL('image/jpeg', 0.82);
        await Photos.set(id, out);
        const it = findItem(id); if (it){ it.hasPhoto = true; save(); }
        cb && cb(out);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// Capture a photo and hand back a resized JPEG data URL (not stored).
function getPhotoDataURL(cb){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => {
    const file = inp.files[0]; if (!file){ cb(null); return; }
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const max = 900;
        let { width:w, height:h } = img;
        if (w > max || h > max){ const r = Math.min(max/w, max/h); w = Math.round(w*r); h = Math.round(h*r); }
        const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        cb(cv.toDataURL('image/jpeg', 0.8));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

/* ------- Claude API key and photo analysis ------- */
const AIKEY = 'ashoak_aikey';
function getAiKey(){ try{ return localStorage.getItem(AIKEY) || ''; }catch(e){ return ''; } }
function setAiKey(v){ try{ localStorage.setItem(AIKEY, v); }catch(e){} }

function analyzePhoto(){
  const key = getAiKey();
  if (!key){
    toast('Add your Claude API key on the You tab first');
    go('stats');
    return;
  }
  getPhotoDataURL((dataURL) => {
    if (!dataURL) return;
    toast('Analyzing photo...');
    const m = dataURL.match(/^data:(image\/\w+);base64,(.*)$/);
    if (!m){ toast('Could not read the photo'); return; }
    const mediaType = m[1], b64 = m[2];
    const prompt = 'You are a cigar pairing assistant. Look at this photo of food or a drink. '
      + 'Respond with ONLY compact JSON, no prose, in this exact shape: '
      + '{"kind":"food|drink","name":"short name",'
      + '"food":"one of: none,snack,salad,fish,sushi,chicken,pasta,pizza,chinese,burger,mexican,spicy,bbq,steak,dessert",'
      + '"drinkCat":"one of: coffee,tequila,bourbon,whisky,rum,beer,wine,none",'
      + '"drinkStyle":"for beer use dark|amber|hoppy|light|wheat, for wine use bold-red|light-red|white|sparkling|port, otherwise empty"}. '
      + 'If it is food, set kind to food and pick the closest food value. If it is a drink, set kind to drink and pick drinkCat and drinkStyle.';
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.error){ toast('Analysis error: ' + (data.error.message||'check your key')); return; }
      const txt = (data.content && data.content[0] && data.content[0].text) || '';
      const jm = txt.match(/\{[\s\S]*\}/);
      if (!jm){ toast('Could not read the result'); return; }
      let parsed; try{ parsed = JSON.parse(jm[0]); }catch(e){ toast('Could not read the result'); return; }
      applyAnalysis(parsed);
    })
    .catch(() => toast('Network error. Photo analysis needs internet.'));
  });
}

function applyAnalysis(p){
  if (p.kind === 'food'){
    ADV.customMeal = '';
    const ids = MEALS.map(m => m.id);
    ADV.mealId = ids.includes(p.food) ? p.food : 'snack';
  } else if (p.kind === 'drink'){
    ADV.customDrink = '';
    ADV.bevCat = p.drinkCat || 'none';
    ADV.bevStyle = p.drinkStyle || '';
    ADV.bevId = '';
  }
  renderNow();
  toast('Detected: ' + (p.name || p.kind));
  runAdvisor();
}

  `;

  sel.addEventListener('change', () => { ADV.bevId = sel.value; showBevInfo(); });
  showBevInfo();
}
function showBevInfo(){
  const info = document.getElementById('bevinfo'); if (!info) return;
  const b = ADV.bevId ? findItem(ADV.bevId) : null;
  if (!b){ info.innerHTML = ''; return; }
  info.innerHTML = `${esc(b.flavor||'')} <a href="#" id="bevmore">View full details</a>`;
  const a = info.querySelector('#bevmore');
  if (a) a.addEventListener('click', (e) => { e.preventDefault(); openDetail(b.id); });
}
function deriveBev(){
  const cat = ADV.bevCat;
  if (cat === 'none') return 'none';
  if (cat === 'coffee') return 'coffee';
  if (cat === 'tequila') return 'tequila';
  if (cat === 'whisky') return 'nikka';
  if (cat === 'bourbon') return 'bourbon';
  if (cat === 'rum'){
    const b = ADV.bevId ? findItem(ADV.bevId) : null;
    return (b && b.style === 'Aged Rum') ? 'bourbon' : 'agricole';
  }
  if (cat === 'beer'){
    if (ADV.bevStyle === 'dark') return 'beer-dark';
    if (ADV.bevStyle === 'hoppy') return 'beer-hoppy';
    return 'beer-light';
  }
  if (cat === 'wine'){
    if (ADV.bevStyle === 'bold-red') return 'wine-bold';
    if (ADV.bevStyle === 'port') return 'wine-sweet';
    if (ADV.bevStyle === 'sparkling') return 'wine-sparkling';
    return 'wine-light';
  }
  return 'none';
}
function deriveFood(){
  const t = (ADV.customMeal||'').trim();
  if (t) return classifyFoodText(t);
  const m = MEALS.find(x => x.id === ADV.mealId) || MEALS[1];
  return { w:m.weight, empty:!!m.empty, dessert:!!m.dessert, seafood:!!m.seafood, spicy:!!m.spicy, label:m.label };
}
// Map a freely typed food to the same weight and palate tags the advisor uses.
function classifyFoodText(text){
  const t = text.toLowerCase();
  const has = (...words) => words.some(x => t.includes(x));
  const base = { w:2, empty:false, dessert:false, seafood:false, spicy:false, label:text };
  if (has('nothing','fasting','empty stomach','didnt eat','did not eat','skipped')) return Object.assign(base,{ w:0, empty:true });
  if (has('dessert','cake','ice cream','chocolate','cookie','pie','pastry','donut','brownie','cheesecake','candy','sweet')) return Object.assign(base,{ w:1, dessert:true });
  if (has('sushi','sashimi','fish','salmon','tuna','shrimp','prawn','crab','lobster','oyster','ceviche','poke','scallop','seafood','clam','mussel')) return Object.assign(base,{ w:1, seafood:true });
  if (has('spicy','hot wings','buffalo','curry','szechuan','sichuan','jalapeno','habanero','thai','kimchi','nashville hot','vindaloo')) return Object.assign(base,{ w:2, spicy:true });
  if (has('steak','ribeye','ribs','brisket','bbq','barbecue','prime rib','beef','lamb','pork belly','duck','short rib','wagyu','porterhouse','filet')) return Object.assign(base,{ w:3 });
  if (has('salad','veggie','vegetable','fruit','soup','snack','crackers','nuts','cheese plate','yogurt')) return Object.assign(base,{ w:1 });
  if (has('pizza','pasta','burger','sandwich','taco','burrito','chinese','ramen','noodle','rice','fried chicken','chicken','wings','pho','sushi roll','poutine','mac and cheese','quesadilla','enchilada','gyro','kebab','shawarma','fries')) return Object.assign(base,{ w:2 });
  return base; // default to a medium meal
}
// Map a freely typed drink to a beverage category and style the advisor understands.
function classifyDrinkText(text){
  const t = text.toLowerCase();
  const has = (...words) => words.some(x => t.includes(x));
  if (has('water','nothing','soda','coke','pepsi','sprite','juice','lemonade','iced tea','tea')) return { cat:'none', style:'' };
  if (has('coffee','espresso','latte','cappuccino','americano','cold brew','macchiato')) return { cat:'coffee', style:'' };
  if (has('champagne','prosecco','sparkling','cava','brut','cremant','sake')) return { cat:'wine', style:'sparkling' };
  if (has('cabernet','malbec','syrah','shiraz','zinfandel','bordeaux','bold red','petite sirah','nebbiolo','barolo','cab ')) return { cat:'wine', style:'bold-red' };
  if (has('pinot noir','light red','grenache','beaujolais','red blend','merlot')) return { cat:'wine', style:'light-red' };
  if (has('chardonnay','sauvignon','white wine','riesling','pinot grigio','pinot gris','albarino','rosé','viognier','chenin') || /\brose\b/.test(t)) return { cat:'wine', style:'white' };
  if (has('port','sherry','dessert wine','moscato','sauternes','madeira','ice wine')) return { cat:'wine', style:'port' };
  if (has('stout','porter','guinness','imperial')) return { cat:'beer', style:'dark' };
  if (has('ipa','pale ale','hazy','double ipa','hops')) return { cat:'beer', style:'hoppy' };
  if (has('wheat','hefeweizen','witbier','belgian','blue moon','saison')) return { cat:'beer', style:'wheat' };
  if (has('lager','pilsner','light beer','amber','ale','beer','cerveza','modelo','corona','stella','heineken','budweiser','michelob')) return { cat:'beer', style:'light' };
  if (has('bourbon','rye','manhattan','old fashioned','buffalo trace','makers','maker\'s','woodford','blanton','weller','eagle rare','four roses','wild turkey','knob creek','pappy','larceny')) return { cat:'bourbon', style:'' };
  if (has('scotch','single malt','islay','speyside','japanese whisky','whisky','whiskey','macallan','glenlivet','glenfiddich','lagavulin','laphroaig','yamazaki','hibiki','nikka','johnnie walker','balvenie','oban','glenmorangie')) return { cat:'whisky', style:'' };
  if (has('tequila','mezcal','margarita','paloma','blanco','reposado','anejo','añejo','patron','patrón','don julio','casamigos','clase azul','fortaleza','espolon','espolòn')) return { cat:'tequila', style:'' };
  if (has('rhum agricole','agricole')) return { cat:'rum', style:'' };
  if (has('rum','daiquiri','mojito','mai tai','pina colada','rum punch','zacapa','diplomatico','appleton','bacardi')) return { cat:'rum', style:'' };
  if (has('gin','vodka','martini','cognac','brandy','wine')) return { cat:'wine', style:'light-red' };
  return { cat:'none', style:'' };
}
function applyCustomDrink(){
  const t = (ADV.customDrink||'').trim();
  if (!t) return;
  const { cat, style } = classifyDrinkText(t);
  ADV.bevCat = cat; ADV.bevStyle = style; ADV.bevId = '';
}

function scoreCigar(it){
  let s = 0; const w = it.wrapperType; const b = it.body;
  const dark = (w==='maduro'||w==='oscuro'||w==='san-andres'||w==='broadleaf');
  // Beverage
  if (ADV.bev === 'coffee'){ if (w==='ct-shade') s+=4; if (w==='natural') s+=3; if (b<=3) s+=2; if (b>=5) s-=4; if (it.dailyDriver) s+=2; }
  if (ADV.bev === 'nikka'){ if (w==='san-andres') s+=5; if (w==='ct-shade') s+=4; if (w==='broadleaf'||w==='maduro') s+=2; }
  if (ADV.bev === 'bourbon'){ if (w==='san-andres'||w==='broadleaf'||w==='maduro') s+=4; if (b>=4) s+=2; if (w==='ct-shade') s-=2; }
  if (ADV.bev === 'tequila'){ if (w==='ct-shade') s+=5; if (b<=2) s+=2; if (b>=4) s-=3; }
  if (ADV.bev === 'agricole'){ if (b<=3) s+=3; if (w==='ct-shade'||w==='natural'||w==='habano') s+=2; if (b>=4) s-=3; if (w==='oscuro'||w==='infused') s-=4; }
  if (ADV.bev === 'beer-dark'){ if (dark) s+=3; if (b>=4) s+=2; }
  if (ADV.bev === 'beer-hoppy'){ if (b===3||b===4) s+=2; if (w==='habano'||w==='natural') s+=1; }
  if (ADV.bev === 'beer-light'){ if (w==='ct-shade'||w==='natural') s+=2; if (b<=3) s+=2; if (b>=5) s-=3; }
  if (ADV.bev === 'wine-bold'){ if (b>=4) s+=3; if (w==='maduro'||w==='oscuro'||w==='broadleaf') s+=2; }
  if (ADV.bev === 'wine-light'){ if (b<=3) s+=2; if (w==='ct-shade'||w==='natural'||w==='habano') s+=1; if (b>=5) s-=3; }
  if (ADV.bev === 'wine-sweet'){ if (w==='maduro'||w==='san-andres'||w==='broadleaf') s+=3; if (w==='natural') s+=1; }
  if (ADV.bev === 'wine-sparkling'){ if (w==='ct-shade') s+=4; if (b<=2) s+=2; if (b>=4) s-=3; }
  // Food
  const f = ADV.foodD || deriveFood();
  if (f.empty){ if (it.emptyOk) s+=6; if (b>=4 && dark) s-=5; if (b<=2) s+=2; }
  else if (f.dessert){ if (w==='natural'||w==='habano'||w==='ct-shade') s+=3; if (w==='maduro'||w==='oscuro') s-=2; }
  else if (f.w>=3){ if (b>=4) s+=4; if (b<=2) s-=4; }
  else if (f.w===2){ if (b===3||b===4) s+=2; if (b<=1) s-=2; if (b>=5) s-=1; }
  else { if (w==='ct-shade') s+=3; if (b<=3) s+=2; if (b>=4) s-=3; }
  if (f.seafood){ if (w==='ct-shade'||w==='natural') s+=2; if (b>=4) s-=2; }
  if (f.spicy){ if ((w==='maduro'||w==='habano'||w==='san-andres') && (b===3||b===4)) s+=2; if (b>=5) s-=1; }
  // Session
  if (ADV.length === 'working'){ if (it.dailyDriver) s+=3; if (b<=3) s+=1; if (it.special) s-=5; if (it.needsLog) s-=3; }
  if (ADV.length === 'special'){ if (it.special) s+=4; if (it.category==='Premium'||it.category==='Cuban') s+=2; }
  if (ADV.length === 'standard'){ if (it.dailyDriver) s+=1; }
  // General nudge: prefer something in stock
  if (it.qty >= 3) s += 0.5;
  return s;
}

function runAdvisor(){
  applyCustomDrink();
  ADV.bev = deriveBev();
  ADV.foodD = deriveFood();
  const pool = state.cigars.filter(c => c.location === ADV.where);
  const res = document.getElementById('result');
  if (!pool.length){
    res.innerHTML = `<div class="empty">No cigars logged at ${locLabel(ADV.where)} yet. Add some on the Add tab.</div>`;
    return;
  }
  const scored = pool.map(c => ({ c, s: scoreCigar(c) })).sort((a,b) => b.s - a.s);

  // Safe pick: highest score among items that have established notes (not needing log).
  const safeList = scored.filter(x => !x.c.needsLog);
  const safe = (safeList[0] || scored[0]).c;

  // Interesting pick: a different cigar that is special, boutique, exotic, or flagged for logging,
  // with a reasonable score. Falls back to the next best distinct cigar.
  let interesting = null;
  const intrCandidates = scored.filter(x =>
    x.c.id !== safe.id && (x.c.special || x.c.needsLog || x.c.category==='Cuban' || x.c.category==='Lounge' || x.c.category==='Premium')
  );
  // Only consider candidates that are not badly mismatched.
  const okIntr = intrCandidates.filter(x => x.s >= (scored[0].s - 6));
  interesting = (okIntr[0] || intrCandidates[0] || scored.find(x => x.c.id !== safe.id)).c;

  res.innerHTML = `
    ${pickCard('safe', 'Safe pick', safe)}
    ${interesting ? pickCard('intr', 'Interesting pick', interesting) : ''}
    <div class="timing">${timingNotes()}</div>
  `;
  res.querySelectorAll('[data-open]').forEach(el => el.addEventListener('click', () => openDetail(el.dataset.open)));
}

function pickCard(cls, kicker, it){
  const why = it.needsLog
    ? 'No personal tasting notes yet. ' + esc(it.pairing)
    : esc(it.flavor || it.pairing);
  const flags = [];
  if (it.needsLog) flags.push('Flag for logging');
  if (it.special) flags.push('Special occasion');
  const sc = smokedCount(it);
  const seen = sc ? `You have smoked this ${sc} time${sc>1?'s':''}. Last on ${fmtDate(lastSmoked(it))}.` : 'You have not logged this one yet.';
  return `
    <div class="pick ${cls}" data-open="${it.id}">
      <div class="kicker">${kicker}</div>
      <div class="nm">${esc(it.name)}</div>
      <div class="loc">${esc(it.bodyLabel)} · ${esc(it.wrapper)} · ${locLabel(it.location)} · ${it.qty} on hand</div>
      <div class="why">${why}</div>
      <div class="loc">${seen}${flags.length ? ' · ' + flags.join(' · ') : ''}</div>
    </div>`;
}

function timingNotes(){
  const out = [];
  const f = deriveFood();
  const bev = deriveBev();
  const bottle = ADV.bevId ? findItem(ADV.bevId) : null;
  out.push(`Just had: <b>${esc(f.label)}</b>.`);
  if (bottle) out.push(`Drinking <b>${esc(bottle.name)}</b>. ${esc(bottle.pairing||'')}`);
  else if (ADV.bevCat === 'beer' || ADV.bevCat === 'wine'){
    const styles = ADV.bevCat === 'beer' ? BEER_STYLES : WINE_STYLES;
    const st = styles.find(x => x.v === ADV.bevStyle);
    if (st) out.push(`Drinking <b>${esc(st.label)}</b>.`);
  }
  if (f.w >= 3) out.push('Wait <b>30 to 45 minutes</b> after a heavy meal before lighting.');
  if (f.empty) out.push('Empty stomach: stay mild to medium and avoid full maduros until you have eaten.');
  if (f.dessert) out.push('Sip <b>water</b> between sweet food and the cigar to clear residual sugar from the palate.');
  if (f.seafood) out.push('After seafood, keep the cigar mild to medium so it does not flatten the lighter palate.');
  if (f.spicy) out.push('After spicy food, a little natural sweetness in the wrapper balances the heat.');
  if (ADV.bevCat === 'whisky') out.push('Single malt: serve <b>neat, no ice</b>. Add a small water drop at the <b>halfway point of the cigar</b>.');
  if (ADV.bevCat === 'whisky' || ADV.bevCat === 'bourbon'){
    out.push('Whisky pacing: small pour, <b>1 to 1.5 oz</b>, sip every 8 to 12 minutes or every 3 to 4 draws, always between draws. Do not refill mid cigar if the pour finishes first.');
  }
  if (bev === 'agricole') out.push('Agricole rum is delicate. Let the cigar complement it, do not overwhelm the grassy vanilla character.');
  if (bev === 'wine-sweet') out.push('Port and dessert wine pair with maduro sweetness. Avoid a dry, peppery cigar that fights the wine.');
  if (bev === 'wine-sparkling') out.push('Champagne wants a light, creamy cigar. Anything full will bury the bubbles.');
  if (bev === 'beer-dark') out.push('A stout or porter loves a maduro. The roast and the sweetness meet in the middle.');
  if (ADV.length === 'special') out.push('Two cigar session: go lighter to fuller, and reset the palate between sticks.');
  if (ADV.length === 'working') out.push('Working session: keep it low maintenance. Save the focused sticks for when you can pay attention.');
  return out.map(x => '• ' + x).join('<br>');
}

let cigarFilter = 'all';
let cigarSearch = '';
function renderCigars(){
  view.innerHTML = `
    <div class="search"><input id="csearch" placeholder="Search cigars by name or brand" value="${esc(cigarSearch)}"></div>
    <button class="btn gold sm" id="cadd" style="width:100%; margin:2px 0 2px;">📷 Add a cigar with a photo</button>
    <button class="btn ghost sm" id="caddform" style="width:100%; margin:0 0 2px;">✎ Add a cigar by typing details</button>
    <div class="filters" id="cfilters">
      ${cfilter('all','All')}${cfilter('home','Home')}${cfilter('lounge','Lounge')}${cfilter('Premium','Premium')}${cfilter('Cuban','Cuban')}${cfilter('Nicaraguan','Nica/Hon')}${cfilter('Everyday','Everyday')}${cfilter('new','Not smoked')}${cfilter('flag','To log')}
    </div>
    <div class="card" id="clist"></div>
  `;
  document.getElementById('cadd').addEventListener('click', addCigarWithPhoto);

  });

function cfilter(f, label){ return `<button data-f="${f}" class="${cigarFilter===f?'on':''}">${label}</button>`; }
function drawCigarList(){
  let list = state.cigars.slice();
  const q = cigarSearch.trim().toLowerCase();
  if (q) list = list.filter(c => (c.name+' '+c.brand+' '+c.wrapper).toLowerCase().includes(q));
  if (cigarFilter==='home'||cigarFilter==='lounge') list = list.filter(c => c.location===cigarFilter);
  else if (['Premium','Cuban','Nicaraguan','Everyday'].includes(cigarFilter)) list = list.filter(c => c.category===cigarFilter);
  else if (cigarFilter==='new') list = list.filter(c => smokedCount(c)===0);
  else if (cigarFilter==='flag') list = list.filter(c => c.needsLog);
  list.sort((a,b)=> a.name.localeCompare(b.name));
  const el = document.getElementById('clist');
  if (!list.length){ el.innerHTML = `<div class="empty">No cigars match. Try a different filter.</div>`; return; }
  el.innerHTML = list.map(itemRow).join('');
  hydrateRows(el);
}

let spiritSearch = '';
const spiritNav = { category:null, style:null };
const SPIRIT_CAT_ICON = { Tequila:'🌵', Bourbon:'🥃', Whisky:'🥃', Rum:'🍹', Other:'☕' };

function renderSpirits(){
  view.innerHTML = `
    <div class="search"><input id="ssearch" placeholder="Search every spirit by name, brand, or style" value="${esc(spiritSearch)}"></div>
    <div id="sbody"></div>
  `;
  document.getElementById('ssearch').addEventListener('input', (e) => { spiritSearch = e.target.value; drawSpirits(); });
  drawSpirits();
}

function drawSpirits(){
  const body = document.getElementById('sbody');
  const q = spiritSearch.trim().toLowerCase();

  // Search overrides the drill-down and lists matches across the whole catalog.
  if (q){
    const matches = state.spirits.filter(s => (s.name+' '+s.category+' '+s.style+' '+s.producer).toLowerCase().includes(q));
    body.innerHTML = `<div class="card">${matches.length ? matches.map(itemRow).join('') : `<div class="empty">No spirits match.</div>`}</div>`;
    hydrateRows(body.querySelector('.card'));
    return;
  }

  // Level 3: bottles within a chosen style.
  if (spiritNav.category && spiritNav.style){
    const bottles = state.spirits.filter(s => s.category===spiritNav.category && s.style===spiritNav.style).sort((a,b)=>a.name.localeCompare(b.name));
    body.innerHTML = `
      ${crumb(spiritNav.category + ' · ' + spiritNav.style)}
      <div class="card">${bottles.map(itemRow).join('')}</div>
    `;
    wireCrumb(); hydrateRows(body.querySelector('.card'));
    return;
  }

  // Level 2: styles within a chosen category.
  if (spiritNav.category){
    const inCat = state.spirits.filter(s => s.category===spiritNav.category);
    const styles = [...new Set(inCat.map(s => s.style))];
    body.innerHTML = `
      ${crumb(spiritNav.category)}
      <div class="card">
        ${styles.map(st => {
          const n = inCat.filter(s => s.style===st).length;
          return `<button class="comprow" data-style="${esc(st)}">
            <span>${esc(st)}</span><span class="cnt">${n}</span></button>`;
        }).join('')}
      </div>
    `;
    wireCrumb();
    body.querySelectorAll('[data-style]').forEach(b => b.addEventListener('click', () => { spiritNav.style = b.dataset.style; drawSpirits(); window.scrollTo(0,0); }));
    return;
  }

  // Level 1: categories, plus an On the bar shortcut.
  const cats = [...new Set(state.spirits.map(s => s.category).filter(Boolean))];
  const owned = state.spirits.filter(s => s.owned);
  body.innerHTML = `
    ${owned.length ? `<h2 class="sec">On the Tap N Ash bar</h2><div class="card">${owned.map(itemRow).join('')}</div>` : ''}
    <h2 class="sec">Browse by spirit</h2>
    <div class="card">
      ${cats.map(c => {
        const n = state.spirits.filter(s => s.category===c).length;
        return `<button class="comprow" data-cat="${esc(c)}">
          <span>${SPIRIT_CAT_ICON[c]||'🥃'} ${esc(c)}</span><span class="cnt">${n}</span></button>`;
      }).join('')}
    </div>
    <p class="hint">Pick a spirit, then a style, then the exact bottle for the full profile: maker, distillery, history, flavor, cost, and what the experts say. Add your own with the Add tab.</p>
  `;
  body.querySelectorAll('.card').forEach(hydrateRows);
  body.querySelectorAll('[data-cat]').forEach(b => b.addEventListener('click', () => { spiritNav.category = b.dataset.cat; spiritNav.style = null; drawSpirits(); window.scrollTo(0,0); }));
}
function crumb(text){
  return `<div class="crumbs"><button class="crumb-back" id="crumbback">← Back</button><span class="crumb-here">${esc(text)}</span></div>`;
}
function wireCrumb(){
  const b = document.getElementById('crumbback'); if (!b) return;
  b.addEventListener('click', () => {
    if (spiritNav.style) spiritNav.style = null;
    else spiritNav.category = null;
    drawSpirits(); window.scrollTo(0,0);
  });
}

/* ------- Shared row rendering ------- */
function itemRow(it){
  const isCigar = it.kind === 'cigar';
  const sc = smokedCount(it);
  const badges = [];
  if (isCigar){
    badges.push(`<span class="badge body">${esc(it.bodyLabel)}</span>`);
    if (it.needsLog) badges.push(`<span class="badge flag">To log</span>`);
    else if (sc>0) badges.push(`<span class="badge smoked">Smoked ${sc}×</span>`);
    else badges.push(`<span class="badge new">New</span>`);
  } else {
    if (it.style) badges.push(`<span class="badge">${esc(it.style)}</span>`);
    if (it.owned) badges.push(`<span class="badge smoked">On the bar</span>`);
    if (it.expert) badges.push(`<span class="badge new">Critic notes</span>`);
  }
  const sub = isCigar
    ? `${esc(it.brand)} · ${esc(it.wrapper)} · ${it.qty} on hand`
    : `${esc(it.producer||it.category)}${it.price?' · '+esc(it.price):''}`;
  const icon = isCigar ? '🚬' : (SPIRIT_CAT_ICON[it.category] || '🥃');
  return `
    <div class="item" data-open="${it.id}">
      <div class="thumb" data-photo="${it.id}">${icon}</div>
      <div class="info">
        <div class="nm">${esc(it.name)}</div>
        <div class="sub">${sub}</div>
        <div class="badges">${badges.join('')}</div>
      </div>
    </div>`;
}
function hydrateRows(container){
  container.querySelectorAll('[data-open]').forEach(el => el.addEventListener('click', () => openDetail(el.dataset.open)));
  container.querySelectorAll('.thumb[data-photo]').forEach(el => {
    const it = findItem(el.dataset.photo);
    if (it && it.hasPhoto) setThumb(el, it.id);
  });
}

/* ============================ DETAIL SHEET ============================ */
function openDetail(id){
  const it = findItem(id); if (!it) return;
  const isCigar = it.kind === 'cigar';
  const sc = smokedCount(it);
  const seen = isCigar ? (sc
    ? `<div class="note"><b>You have smoked this ${sc} time${sc>1?'s':''}.</b> Last on ${fmtDate(lastSmoked(it))}.${avgRating(it)?` Your average rating ${stars(avgRating(it))}.`:''}</div>`
    : `<div class="note muted">You have not smoked this one yet. It is new to your log.</div>`) : '';

  const drow = (k, v) => v ? `<div class="drow"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>` : '';

  const profile = (isCigar && it.needsLog)
    ? `<div class="note muted">No personal tasting notes logged yet. ${esc(it.pairing)}</div>`
    : `${it.flavor?`<div class="note"><b>Flavor.</b> ${esc(it.flavor)}</div>`:''}${it.pairing?`<div class="note"><b>Pairing.</b> ${esc(it.pairing)}</div>`:''}`;

  const rows = isCigar ? `
    ${drow('Brand', it.brand)}
    ${drow('Maker', it.manufacturer)}
    ${drow('Factory', it.factory)}
    ${drow('Origin', it.country || it.origin)}
    ${drow('Founded', it.founded)}
    ${drow('Wrapper', it.wrapper)}
    ${drow('Body', it.bodyLabel)}
    ${drow('Category', it.category)}
    ${drow('Approx cost', it.price)}
    ${drow('Location', locLabel(it.location))}
    <div class="drow"><span class="k">On hand</span><span class="v" id="qtyv">${it.qty}</span></div>
  ` : `
    ${drow('Category', it.category)}
    ${drow('Style', it.style)}
    ${drow('Producer', it.producer)}
    ${drow('Distillery', it.distillery)}
    ${drow('Region', it.region)}
    ${drow('Country', it.country)}
    ${drow('ABV', it.abv)}
    ${drow('Age', it.age)}
    ${drow('Approx cost', it.price)}
    ${it.owned?`<div class="drow"><span class="k">Location</span><span class="v">${locLabel(it.location)}</span></div>`:''}
  `;

  const historyHtml = it.history
    ? `<h2 class="sec" style="margin-top:18px;">History</h2><div class="note">${esc(it.history)}</div>` : '';

  const expertHtml = `
    <h2 class="sec" style="margin-top:18px;">What the experts say</h2>
    ${it.expert ? `<div class="expertbox"><b>Critic consensus.</b> ${esc(it.expert)}</div>`
                : `<div class="note muted">No critic notes saved for this one yet.</div>`}
    <button class="btn sm ghost" id="expertsearch" style="margin-top:10px;">🔎 Search expert reviews online</button>`;

  const logHtml = (it.log||[]).slice().reverse().map(l => `
    <div class="logentry"><span class="d">${fmtDate(l.date)}${l.notes?' · '+esc(l.notes):''}</span><span class="stars">${l.rating?stars(l.rating):''}</span></div>
  `).join('') || `<div class="note muted">No sessions logged.</div>`;

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.innerHTML = `
    <div class="panel">
      <div class="grab"></div>
      <div class="dphoto" id="dphoto">${isCigar?'🚬':(SPIRIT_CAT_ICON[it.category]||'🥃')}</div>
      <div class="row2">
        <button class="btn sm" id="takephoto">📷 ${it.hasPhoto?'Replace photo':'Add photo'}</button>
        ${isCigar?`<button class="btn sm gold" id="logsmoke">🔥 Log a smoke</button>`:`<button class="btn sm gold" id="logsip">🥃 Log a pour</button>`}
      </div>
      <h2 style="margin:14px 2px 2px; font-size:20px; color:var(--gold2);">${esc(it.name)}</h2>
      ${seen}
      ${profile}
      <div style="margin-top:14px;">${rows}</div>
      ${isCigar?`
        <div class="row2">
          <button class="btn sm ghost" id="qminus">− Smoke / remove one</button>
          <button class="btn sm ghost" id="qplus">＋ Add one</button>
        </div>`:''}
      ${historyHtml}
      ${expertHtml}
      ${isCigar?`
        <h2 class="sec" style="margin-top:18px;">Your session log</h2>
        <div id="loglist">${logHtml}</div>
      `:`
        <h2 class="sec" style="margin-top:18px;">Your pour log</h2>
        <div id="loglist">${logHtml}</div>
      `}
      <div class="row2" style="margin-top:18px;">
        <button class="btn sm ghost" id="edit">✎ Edit details</button>
        <button class="btn sm ghost danger" id="del">Delete</button>
      </div>
      <button class="btn" id="close" style="margin-top:10px;">Close</button>
    </div>`;
  document.body.appendChild(sheet);
  const close = () => sheet.remove();
  sheet.addEventListener('click', (e) => { if (e.target === sheet) close(); });
  sheet.querySelector('#close').addEventListener('click', close);

  const photoEl = sheet.querySelector('#dphoto');
  if (it.hasPhoto) Photos.get(it.id).then(d => { if (d){ photoEl.style.backgroundImage = `url(${d})`; photoEl.style.backgroundSize='cover'; photoEl.style.backgroundPosition='center'; photoEl.textContent=''; } });

  sheet.querySelector('#takephoto').addEventListener('click', () => {
    pickAndStorePhoto(it.id, (data) => {
      photoEl.style.backgroundImage = `url(${data})`; photoEl.style.backgroundSize='cover'; photoEl.style.backgroundPosition='center'; photoEl.textContent='';
      toast('Photo saved');
    });
  });

  if (isCigar){
    sheet.querySelector('#logsmoke').addEventListener('click', () => { close(); openLogSmoke(it.id); });
    sheet.querySelector('#qplus').addEventListener('click', () => { it.qty++; save(); sheet.querySelector('#qtyv').textContent = it.qty; });
    sheet.querySelector('#qminus').addEventListener('click', () => { if (it.qty>0) it.qty--; save(); sheet.querySelector('#qtyv').textContent = it.qty; toast('Removed one'); });
  } else {
    sheet.querySelector('#logsip').addEventListener('click', () => { close(); openLogSmoke(it.id); });
  }
  sheet.querySelector('#expertsearch').addEventListener('click', () => {
    const q = isCigar ? `${it.name} cigar review rating` : `${it.name} ${it.category} review`;
    window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
  });
  sheet.querySelector('#edit').addEventListener('click', () => { close(); openEdit(it.id); });
  sheet.querySelector('#del').addEventListener('click', () => {
    if (!confirm(`Delete ${it.name} from inventory? This cannot be undone.`)) return;
    if (it.kind==='cigar') state.cigars = state.cigars.filter(x => x.id !== it.id);
    else state.spirits = state.spirits.filter(x => x.id !== it.id);
    Photos.del(it.id); save(); close(); go(currentTab); toast('Deleted');
  });
}

/* ------- Edit details ------- */
function openEdit(id){
  const it = findItem(id); if (!it) return;
  const isCigar = it.kind === 'cigar';
  const fields = isCigar
    ? [['name','Name'],['brand','Brand'],['manufacturer','Maker'],['factory','Factory'],['country','Origin country'],['founded','Founded'],['wrapper','Wrapper'],['price','Approx cost'],['flavor','Flavor notes','area'],['pairing','Pairing notes','area'],['history','History','area'],['expert','What the experts say','area']]
    : [['name','Name'],['producer','Producer'],['distillery','Distillery'],['region','Region'],['country','Country'],['abv','ABV'],['age','Age'],['price','Approx cost'],['flavor','Flavor notes','area'],['pairing','Pairing notes','area'],['history','History','area'],['expert','What the experts say','area']];
  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.innerHTML = `
    <div class="panel">
      <div class="grab"></div>
      <h2 style="margin:2px 2px 6px; font-size:19px; color:var(--gold2);">Edit ${esc(it.name)}</h2>
      ${fields.map(([k,label,t]) => `
        <label class="fld">${label}</label>
        ${t==='area' ? `<textarea data-k="${k}">${esc(it[k]||'')}</textarea>` : `<input data-k="${k}" value="${esc(it[k]||'')}">`}
      `).join('')}
      <div class="row2" style="margin-top:16px;">
        <button class="btn ghost" id="ecancel">Cancel</button>
        <button class="btn gold" id="esave">Save details</button>
      </div>
    </div>`;
  document.body.appendChild(sheet);
  const close = () => sheet.remove();
  sheet.addEventListener('click', (e) => { if (e.target === sheet) close(); });
  sheet.querySelector('#ecancel').addEventListener('click', () => { close(); openDetail(id); });
  sheet.querySelector('#esave').addEventListener('click', () => {
    sheet.querySelectorAll('[data-k]').forEach(el => {
      const v = el.value.trim();
      if (el.dataset.k === 'name' && !v) return; // never blank the name
      it[el.dataset.k] = v;
    });
    if (isCigar && it.needsLog && it.flavor) it.needsLog = false;
    save(); close(); toast('Details saved'); openDetail(id);
  });
}

/* ------- Log a smoke or pour ------- */
function openLogSmoke(id){
  const it = findItem(id); if (!it) return;
  const isCigar = it.kind === 'cigar';
  let rating = 0;
  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.innerHTML = `
    <div class="panel">
      <div class="grab"></div>
      <h2 style="margin:2px 2px 4px; font-size:19px; color:var(--gold2);">${isCigar?'Log a smoke':'Log a pour'}</h2>
      <div class="note muted">${esc(it.name)} · ${fmtDate(new Date())}</div>
      <label class="fld">How was it?</label>
      <div class="seg" id="rate">
        ${[1,2,3,4,5].map(n=>`<button data-r="${n}">${'★'.repeat(n)}</button>`).join('')}
      </div>
      <label class="fld">Notes (optional)</label>
      <textarea id="lnotes" placeholder="${isCigar?'Flavors, burn, pairing, how it smoked...':'Flavors, what you paired it with, how you served it...'}"></textarea>
      ${isCigar?`
      <label class="fld">Remove one from your count?</label>
      <div class="seg" id="dec">
        <button class="on" data-d="1">Yes, I smoked one</button><button data-d="0">No, just logging</button>
      </div>`:''}
      <div class="row2" style="margin-top:16px;">
        <button class="btn ghost" id="cancel">Cancel</button>
        <button class="btn gold" id="savelog">Save ${isCigar?'session':'pour'}</button>
      </div>
    </div>`;
  document.body.appendChild(sheet);
  const close = () => sheet.remove();
  sheet.addEventListener('click', (e) => { if (e.target === sheet) close(); });
  sheet.querySelector('#cancel').addEventListener('click', close);
  let dec = isCigar ? 1 : 0;
  sheet.querySelector('#rate').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return; rating = +b.dataset.r;
    sheet.querySelectorAll('#rate button').forEach(x => x.classList.toggle('on', +x.dataset.r <= rating));
  });
  const decEl = sheet.querySelector('#dec');
  if (decEl) decEl.addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return; dec = +b.dataset.d;
    decEl.querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
  });
  sheet.querySelector('#savelog').addEventListener('click', () => {
    it.log = it.log || [];
    it.log.push({ date: new Date().toISOString(), rating, notes: sheet.querySelector('#lnotes').value.trim() });
    if (it.needsLog) it.needsLog = false; // once logged it has personal notes
    if (dec && it.qty > 0) it.qty--;
    save(); close(); toast(isCigar?'Session logged':'Pour logged'); go(currentTab);
  });
}

/* ============================ ADD ============================ */
function renderAdd(){
  view.innerHTML = `
    <div class="card">
      <label class="fld">What are you adding?</label>
      <div class="seg" id="kind">
        <button class="on" data-k="cigar">🚬 Cigar</button><button data-k="spirit">🥃 Spirit</button>
      </div>
      <div id="addform"></div>
    </div>
  `;
  let kind = 'cigar';
  drawAddForm(kind);
  document.getElementById('kind').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return; kind = b.dataset.k;
    document.querySelectorAll('#kind button').forEach(x => x.classList.toggle('on', x === b));
    drawAddForm(kind);
  });
}

      <select id="f-body">

        <option value="habano" selected>Habano</option><option value="san-andres">San Andres maduro</option>

      <textarea id="f-pairing" placeholder="What it pairs with"></textarea>
      <button class="btn gold" id="addsave" style="margin-top:16px;">Add cigar</button>

      <label class="fld">Spirit</label>
      <select id="f-cat">
        <option>Tequila</option><option>Bourbon</option><option>Whisky</option><option>Rum</option>
        <option>Rye</option><option>Cognac</option><option>Other</option>
      </select>
      <label class="fld">Style or edition (e.g. Reposado, Wheated, Single Malt)</label>
      <input id="f-style" placeholder="e.g. Reposado">

      <label class="fld">Distillery</label><input id="f-distillery" placeholder="Optional">
      <label class="fld">Region / country</label><input id="f-region" placeholder="e.g. Kentucky, USA">
      <label class="fld">ABV</label><input id="f-abv" placeholder="e.g. 45%">
      <label class="fld">Age</label><input id="f-age" placeholder="Optional">
      <label class="fld">Approx cost</label><input id="f-price" placeholder="e.g. ~$45">

}

/* ============================ STATS / YOU ============================ */
function renderStats(){
  const cigars = state.cigars;
  const totalSticks = cigars.reduce((a,c)=>a+(c.qty||0),0);
  const uniqueSmoked = cigars.filter(c=>smokedCount(c)>0).length;
  const totalSessions = cigars.reduce((a,c)=>a+smokedCount(c),0);
  const toLog = cigars.filter(c=>c.needsLog).length;
  // Recent sessions across all cigars
  const sessions = [];
  cigars.forEach(c => (c.log||[]).forEach(l => sessions.push({ name:c.name, ...l })));
  sessions.sort((a,b)=> new Date(b.date)-new Date(a.date));
  const recent = sessions.slice(0,10);
  // Top rated
  const rated = cigars.filter(c=>avgRating(c)>0).sort((a,b)=>avgRating(b)-avgRating(a)).slice(0,5);

  view.innerHTML = `
    <div class="card">
      <div class="stat">
        <div class="box"><div class="num">${cigars.length}</div><div class="lbl">Cigar labels</div></div>
        <div class="box"><div class="num">${totalSticks}</div><div class="lbl">Sticks on hand</div></div>
      </div>
      <div class="stat" style="margin-top:10px;">
        <div class="box"><div class="num">${totalSessions}</div><div class="lbl">Sessions logged</div></div>
        <div class="box"><div class="num">${uniqueSmoked}</div><div class="lbl">Tried so far</div></div>
        <div class="box"><div class="num">${toLog}</div><div class="lbl">Still to log</div></div>
      </div>
    </div>
    <h2 class="sec">Recent sessions</h2>
    <div class="card">
      ${recent.length ? recent.map(s=>`<div class="logentry"><span class="d">${esc(s.name)} · ${fmtDate(s.date)}${s.notes?' · '+esc(s.notes):''}</span><span class="stars">${s.rating?stars(s.rating):''}</span></div>`).join('') : `<div class="empty">No sessions yet. Smoke something and log it from the cigar's page.</div>`}
    </div>
    <h2 class="sec">Your highest rated</h2>
    <div class="card">
      ${rated.length ? rated.map(c=>`<div class="logentry" data-open="${c.id}" style="cursor:pointer;"><span class="d">${esc(c.name)}</span><span class="stars">${stars(avgRating(c))}</span></div>`).join('') : `<div class="empty">Rate a few smokes to build your top list.</div>`}
    </div>
    <h2 class="sec">Photo analysis</h2>
    <div class="card">
      <label class="fld">Your Claude API key</label>
      <input id="aikey" type="password" placeholder="sk-ant-..." value="${esc(getAiKey())}">
      <div class="row2" style="margin-top:10px;">
        <button class="btn sm gold" id="savekey">Save key</button>
        <button class="btn sm ghost" id="clearkey">Remove key</button>
      </div>
      <p class="hint">Needed only for the "Take a photo and let the app figure it out" button on the Now tab. The key is stored on this device only and is sent straight to Anthropic when you analyze a photo. Get a key at console.anthropic.com. Photo analysis needs internet and uses your Anthropic credits.</p>
    </div>
    <h2 class="sec">Backup</h2>
    <div class="card">
      <div class="row2">
        <button class="btn sm" id="exp">Export data</button>
        <button class="btn sm ghost" id="imp">Import data</button>
      </div>
      <p class="hint">Your inventory and sessions live on this device only. Export a backup before clearing browser data or switching phones. Photos are stored separately and are not in the export.</p>
      <button class="btn ghost danger" id="reset" style="margin-top:10px;">Reset to seed inventory</button>
    </div>
  `;
  view.querySelectorAll('[data-open]').forEach(el => el.addEventListener('click', () => openDetail(el.dataset.open)));
  document.getElementById('savekey').addEventListener('click', () => { setAiKey(document.getElementById('aikey').value.trim()); toast('Key saved'); });
  document.getElementById('clearkey').addEventListener('click', () => { setAiKey(''); document.getElementById('aikey').value=''; toast('Key removed'); });
  document.getElementById('exp').addEventListener('click', exportData);
  document.getElementById('imp').addEventListener('click', importData);
  document.getElementById('reset').addEventListener('click', () => {
    if (!confirm('Reset inventory to the original seed list? Your added items and session logs will be lost.')) return;
    localStorage.removeItem(LS_KEY); state = load(); toast('Reset done'); go('cigars');
  });
}
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ash-and-oak-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); toast('Backup downloaded');
}
function importData(){
  const inp = document.createElement('input'); inp.type='file'; inp.accept='application/json';
  inp.onchange = () => {
    const file = inp.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try{
        const data = JSON.parse(r.result);
        if (!data.cigars || !data.spirits) throw new Error('bad');
        state = data; save(); toast('Data imported'); go('cigars');
      }catch(e){ toast('Could not read that file'); }
    };
    r.readAsText(file);
  };
  inp.click();
}

/* ------- boot ------- */
go('now');
if ('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
